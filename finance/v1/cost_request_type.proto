syntax = "proto3";

package finance.v1;

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "google/api/annotations.proto";

// =============================================================================
// CostRequestType — PRD Phase A §7.1.3 (CRT_).
// Lookup: QUOTE / DEVELOPMENT. Read-only via API for S4; admin CRUD deferred.
// =============================================================================

message CostRequestType {
  int32 type_id = 1;
  string code = 2;
  string display_name = 3;
  // FULL | SHORTCUT_CAPABLE.
  string state_machine_variant = 4;
  string default_urgency = 5;
  bool is_active = 6;
}

message ListCostRequestTypesRequest {
  string search = 1 [(buf.validate.field).string.max_len = 200];
  string active_filter = 2 [(buf.validate.field).string = {
    in: [
      "",
      "all",
      "active",
      "inactive"
    ]
  }];
  common.v1.PaginationRequest pagination = 3;
}

message ListCostRequestTypesResponse {
  common.v1.BaseResponse base = 1;
  repeated CostRequestType data = 2;
  common.v1.PaginationResponse pagination = 3;
}

service CostRequestTypeService {
  rpc ListCostRequestTypes(ListCostRequestTypesRequest) returns (ListCostRequestTypesResponse) {
    option (google.api.http) = {get: "/api/v1/finance/cost-request-types"};
  }
}
