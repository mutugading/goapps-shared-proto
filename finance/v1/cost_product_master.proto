syntax = "proto3";

package finance.v1;

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "google/api/annotations.proto";

// =============================================================================
// CostProductMaster — PRD Phase B §7.4.1 (CPM_).
// Costing-system product identity, separate from ERP. Code auto-generated by
// server: CST + product_type.type_code + YYMM + LPAD(seq, 6, '0').
// ERP linkage fields (erp_item_code / erp_grade_code_1 / erp_grade_code_2) are
// informational — populated AFTER the product appears in ERP.
// =============================================================================

message CostProductMaster {
  int64 product_sys_id = 1;
  string product_code = 2; // auto-generated, read-only
  int32 product_type_id = 3;
  string product_type_code = 4; // denormalized for UI display
  string product_type_name = 5;
  string product_name = 6;
  string shade_code = 7;
  string grade_code = 8; // default 'AX'
  string description = 9;
  string erp_item_code = 10;
  string erp_grade_code_1 = 11;
  string erp_grade_code_2 = 12;
  string erp_linked_at = 13;
  string erp_linked_by = 14;
  bool is_active = 15;
  common.v1.AuditInfo audit = 16;
}

// =============================================================================
// Create — server auto-generates product_code; client supplies type + name + shade + grade.
// =============================================================================

message CreateCostProductMasterRequest {
  int32 product_type_id = 1 [(buf.validate.field).int32.gte = 1];
  string product_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];
  string shade_code = 3 [(buf.validate.field).string.max_len = 50];
  string grade_code = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 20
  }];
  string description = 5 [(buf.validate.field).string.max_len = 1000];
}

message CreateCostProductMasterResponse {
  common.v1.BaseResponse base = 1;
  CostProductMaster data = 2;
}

message GetCostProductMasterRequest {
  int64 product_sys_id = 1 [(buf.validate.field).int64.gte = 1];
}

message GetCostProductMasterResponse {
  common.v1.BaseResponse base = 1;
  CostProductMaster data = 2;
}

message GetCostProductMasterByCodeRequest {
  string product_code = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 20
  }];
}

message GetCostProductMasterByCodeResponse {
  common.v1.BaseResponse base = 1;
  CostProductMaster data = 2;
}

// =============================================================================
// Update — product_code + product_type_id are immutable.
// =============================================================================

message UpdateCostProductMasterRequest {
  int64 product_sys_id = 1 [(buf.validate.field).int64.gte = 1];
  string product_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];
  string shade_code = 3 [(buf.validate.field).string.max_len = 50];
  string grade_code = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 20
  }];
  string description = 5 [(buf.validate.field).string.max_len = 1000];
}

message UpdateCostProductMasterResponse {
  common.v1.BaseResponse base = 1;
  CostProductMaster data = 2;
}

// =============================================================================
// Update ERP linkage — separate RPC because it's typically called later after
// the product appears in ERP. Records erp_linked_at / erp_linked_by.
// =============================================================================

message UpdateCostProductMasterErpLinkageRequest {
  int64 product_sys_id = 1 [(buf.validate.field).int64.gte = 1];
  string erp_item_code = 2 [(buf.validate.field).string.max_len = 20];
  string erp_grade_code_1 = 3 [(buf.validate.field).string.max_len = 20];
  string erp_grade_code_2 = 4 [(buf.validate.field).string.max_len = 20];
}

message UpdateCostProductMasterErpLinkageResponse {
  common.v1.BaseResponse base = 1;
  CostProductMaster data = 2;
}

// =============================================================================
// Deactivate — soft delete. Rejected if used as component in active product orders.
// =============================================================================

message DeactivateCostProductMasterRequest {
  int64 product_sys_id = 1 [(buf.validate.field).int64.gte = 1];
}

message DeactivateCostProductMasterResponse {
  common.v1.BaseResponse base = 1;
}

// =============================================================================
// List — paginated browse with rich filters.
// =============================================================================

message ListCostProductMastersRequest {
  string search = 1 [(buf.validate.field).string.max_len = 200]; // matches product_code OR product_name OR erp_item_code
  int32 product_type_id = 2;
  string shade_code = 3 [(buf.validate.field).string.max_len = 50];
  string active_filter = 4 [(buf.validate.field).string = {
    in: [
      "",
      "all",
      "active",
      "inactive"
    ]
  }];
  common.v1.PaginationRequest pagination = 5;
  string sort_by = 6 [(buf.validate.field).string = {
    in: [
      "",
      "product_code",
      "product_name",
      "created_at"
    ]
  }];
  string sort_order = 7 [(buf.validate.field).string = {
    in: [
      "",
      "asc",
      "desc"
    ]
  }];
}

message ListCostProductMastersResponse {
  common.v1.BaseResponse base = 1;
  repeated CostProductMaster data = 2;
  common.v1.PaginationResponse pagination = 3;
}

service CostProductMasterService {
  rpc CreateCostProductMaster(CreateCostProductMasterRequest) returns (CreateCostProductMasterResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/cost-product-master"
      body: "*"
    };
  }
  rpc GetCostProductMaster(GetCostProductMasterRequest) returns (GetCostProductMasterResponse) {
    option (google.api.http) = {get: "/api/v1/finance/cost-product-master/{product_sys_id}"};
  }
  rpc GetCostProductMasterByCode(GetCostProductMasterByCodeRequest) returns (GetCostProductMasterByCodeResponse) {
    option (google.api.http) = {get: "/api/v1/finance/cost-product-master/by-code/{product_code}"};
  }
  rpc UpdateCostProductMaster(UpdateCostProductMasterRequest) returns (UpdateCostProductMasterResponse) {
    option (google.api.http) = {
      put: "/api/v1/finance/cost-product-master/{product_sys_id}"
      body: "*"
    };
  }
  rpc UpdateCostProductMasterErpLinkage(UpdateCostProductMasterErpLinkageRequest) returns (UpdateCostProductMasterErpLinkageResponse) {
    option (google.api.http) = {
      put: "/api/v1/finance/cost-product-master/{product_sys_id}/erp-linkage"
      body: "*"
    };
  }
  rpc DeactivateCostProductMaster(DeactivateCostProductMasterRequest) returns (DeactivateCostProductMasterResponse) {
    option (google.api.http) = {delete: "/api/v1/finance/cost-product-master/{product_sys_id}"};
  }
  rpc ListCostProductMasters(ListCostProductMastersRequest) returns (ListCostProductMastersResponse) {
    option (google.api.http) = {get: "/api/v1/finance/cost-product-master"};
  }
}
