syntax = "proto3";

package finance.v1;

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "google/api/annotations.proto";

// =============================================================================
// CostDataImportService — async import jobs for large costing datasets.
// =============================================================================

message CostImportJob {
  int64 job_id = 1;
  string entity = 2;
  string status = 3;
  int32 total_rows = 4;
  int32 processed = 5;
  int32 success = 6;
  int32 failed = 7;
  int32 skipped = 8;
  string error_file_url = 9;
  string created_by = 10;
  string created_at = 11;
  string started_at = 12;
  string completed_at = 13;
}

message GetCostImportJobRequest {
  int64 job_id = 1 [(buf.validate.field).int64.gte = 1];
}

message GetCostImportJobResponse {
  common.v1.BaseResponse base = 1;
  CostImportJob data = 2;
}

message ListCostImportJobsRequest {
  string entity = 1 [(buf.validate.field).string = {
    in: [
      "",
      "product_type",
      "parameter",
      "product_master",
      "capp",
      "cpp",
      "bulk_product_routing",
      "bulk_product_routing_export"
    ]
  }];
  string status = 2 [(buf.validate.field).string = {
    in: [
      "",
      "PENDING",
      "RUNNING",
      "DONE",
      "FAILED",
      "PARTIAL"
    ]
  }];
  common.v1.PaginationRequest pagination = 3;
}

message ListCostImportJobsResponse {
  common.v1.BaseResponse base = 1;
  repeated CostImportJob data = 2;
  common.v1.PaginationResponse pagination = 3;
}

message ImportCostApplicableParamsRequest {
  bytes file_content = 1 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 209715200
  }];
  string file_name = 2 [(buf.validate.field).string.pattern = "(?i)^.+\\.xlsx?$"];
  string duplicate_action = 3 [(buf.validate.field).string = {
    in: [
      "skip",
      "update",
      "error"
    ]
  }];
}

message ImportCostApplicableParamsResponse {
  common.v1.BaseResponse base = 1;
  int64 job_id = 2;
}

message ImportCostProductParametersRequest {
  bytes file_content = 1 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 209715200
  }];
  string file_name = 2 [(buf.validate.field).string.pattern = "(?i)^.+\\.xlsx?$"];
  string duplicate_action = 3 [(buf.validate.field).string = {
    in: [
      "skip",
      "update",
      "error"
    ]
  }];
}

message ImportCostProductParametersResponse {
  common.v1.BaseResponse base = 1;
  int64 job_id = 2;
}

message ExportCostApplicableParamsRequest {
  string product_type_code = 1 [(buf.validate.field).string.max_len = 5];
}

message ExportCostApplicableParamsResponse {
  common.v1.BaseResponse base = 1;
  bytes file_content = 2;
  string file_name = 3;
}

message ExportCostProductParametersRequest {
  string product_type_code = 1 [(buf.validate.field).string.max_len = 5];
}

message ExportCostProductParametersResponse {
  common.v1.BaseResponse base = 1;
  bytes file_content = 2;
  string file_name = 3;
}

message DownloadCostApplicableParamTemplateRequest {}

message DownloadCostApplicableParamTemplateResponse {
  common.v1.BaseResponse base = 1;
  bytes file_content = 2;
  string file_name = 3;
}

message DownloadCostProductParameterTemplateRequest {}

message DownloadCostProductParameterTemplateResponse {
  common.v1.BaseResponse base = 1;
  bytes file_content = 2;
  string file_name = 3;
}

message ImportRowError {
  int32 row_number = 1;
  string field = 2;
  string message = 3;
}

message BulkSheetValidationResult {
  string sheet_name = 1;
  int32 total_rows = 2;
  int32 error_count = 3;
  int32 warning_count = 4;
  repeated ImportRowError sample_errors = 5;
}

message ImportBulkProductRoutingRequest {
  bytes file_content = 1 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 52428800
  }];
  string file_name = 2;
  string duplicate_action = 3 [(buf.validate.field).string = {
    in: [
      "",
      "skip",
      "update"
    ]
  }];
}

message ImportBulkProductRoutingResponse {
  common.v1.BaseResponse base = 1;
  int64 job_id = 2;
  string status = 3;
}

// ImportBulkParamsOnlyRequest imports product_parameters + product_applicable_params
// from a file that does NOT contain a product_master sheet. Products must already
// exist in the database from a prior bulk import. Supports split part-sheets
// (e.g. "product_parameters_p1" + "_p2"). Max 200 MB.
message ImportBulkParamsOnlyRequest {
  bytes file_content = 1 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 209715200
  }];
  string file_name = 2;
}

// ImportBulkParamsOnlyResponse returns the created async job ID.
message ImportBulkParamsOnlyResponse {
  common.v1.BaseResponse base = 1;
  int64 job_id = 2;
  string status = 3;
}

message ValidateBulkProductRoutingFileRequest {
  bytes file_content = 1 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 10485760
  }];
  string file_name = 2;
}

message ValidateBulkProductRoutingFileResponse {
  common.v1.BaseResponse base = 1;
  bool is_valid = 2;
  repeated BulkSheetValidationResult sheets = 3;
}

message ExportBulkProductRoutingRequest {
  repeated string product_type_codes = 1;
  bool include_routing = 2;
  bool active_only = 3;
  // product_sys_ids, when non-empty, restricts the export to the transitive
  // closure of the given products (the listed products plus every intermediate
  // product reachable via PRODUCT-type route RMs). Mutually exclusive with
  // product_type_codes; product_sys_ids takes precedence when both are set.
  repeated int64 product_sys_ids = 4;
}

message ExportBulkProductRoutingResponse {
  common.v1.BaseResponse base = 1;
  int64 job_id = 2;
  string status = 3;
}

service CostDataImportService {
  rpc GetCostImportJob(GetCostImportJobRequest) returns (GetCostImportJobResponse) {
    option (google.api.http) = {get: "/api/v1/finance/costing/import-jobs/{job_id}"};
  }

  rpc ListCostImportJobs(ListCostImportJobsRequest) returns (ListCostImportJobsResponse) {
    option (google.api.http) = {get: "/api/v1/finance/costing/import-jobs"};
  }

  rpc ImportCostApplicableParams(ImportCostApplicableParamsRequest) returns (ImportCostApplicableParamsResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/costing/capp/import"
      body: "*"
    };
  }

  rpc ExportCostApplicableParams(ExportCostApplicableParamsRequest) returns (ExportCostApplicableParamsResponse) {
    option (google.api.http) = {get: "/api/v1/finance/costing/capp/export"};
  }

  rpc DownloadCostApplicableParamTemplate(DownloadCostApplicableParamTemplateRequest) returns (DownloadCostApplicableParamTemplateResponse) {
    option (google.api.http) = {get: "/api/v1/finance/costing/capp/template"};
  }

  rpc ImportCostProductParameters(ImportCostProductParametersRequest) returns (ImportCostProductParametersResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/costing/cpp/import"
      body: "*"
    };
  }

  rpc ExportCostProductParameters(ExportCostProductParametersRequest) returns (ExportCostProductParametersResponse) {
    option (google.api.http) = {get: "/api/v1/finance/costing/cpp/export"};
  }

  rpc DownloadCostProductParameterTemplate(DownloadCostProductParameterTemplateRequest) returns (DownloadCostProductParameterTemplateResponse) {
    option (google.api.http) = {get: "/api/v1/finance/costing/cpp/template"};
  }

  rpc ImportBulkProductRouting(ImportBulkProductRoutingRequest) returns (ImportBulkProductRoutingResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/costing/import/bulk_product_routing"
      body: "*"
    };
  }

  // ImportBulkParamsOnly imports product parameters from a params-only file.
  // Products must already exist in the database from a prior bulk import run.
  rpc ImportBulkParamsOnly(ImportBulkParamsOnlyRequest) returns (ImportBulkParamsOnlyResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/costing/import/bulk_params_only"
      body: "*"
    };
  }

  rpc ValidateBulkProductRoutingFile(ValidateBulkProductRoutingFileRequest) returns (ValidateBulkProductRoutingFileResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/costing/validate/bulk_product_routing"
      body: "*"
    };
  }

  rpc ExportBulkProductRouting(ExportBulkProductRoutingRequest) returns (ExportBulkProductRoutingResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/costing/export/bulk_product_routing"
      body: "*"
    };
  }
}
