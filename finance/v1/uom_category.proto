syntax = "proto3";

package finance.v1;

// Note: go_package is managed by buf.gen.yaml managed mode

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "finance/v1/uom.proto";
import "google/api/annotations.proto";

// =============================================================================
// MESSAGES - Entity
// =============================================================================

// UOMCategory represents a Unit of Measure Category entity.
// Used to classify UOMs (e.g., Weight, Length, Volume, Quantity, Time, Energy).
message UOMCategory {
  // Unique identifier (UUID).
  string uom_category_id = 1;
  // Unique code (e.g., "WEIGHT", "LENGTH", "VOLUME"). Immutable after creation.
  string category_code = 2;
  // Display name (e.g., "Weight", "Length", "Volume").
  string category_name = 3;
  // Optional description.
  string description = 4;
  // Whether the category is active.
  bool is_active = 5;
  // Audit information.
  common.v1.AuditInfo audit = 16;
}

// =============================================================================
// MESSAGES - Create
// =============================================================================

// CreateUOMCategoryRequest is the request for creating a new UOM category.
message CreateUOMCategoryRequest {
  // Unique code (uppercase, alphanumeric with underscore, 1-20 chars).
  // Must start with an uppercase letter. Immutable after creation.
  string category_code = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 20
    pattern: "^[A-Z][A-Z0-9_]*$"
  }];
  // Display name (1-100 chars).
  string category_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];
  // Optional description (max 500 chars).
  string description = 3 [(buf.validate.field).string.max_len = 500];
}

// CreateUOMCategoryResponse is the response for creating a UOM category.
message CreateUOMCategoryResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Created UOM category data.
  UOMCategory data = 2;
}

// =============================================================================
// MESSAGES - Get
// =============================================================================

// GetUOMCategoryRequest is the request for getting a UOM category by ID.
message GetUOMCategoryRequest {
  // UOM category ID (UUID format).
  string uom_category_id = 1 [(buf.validate.field).string.uuid = true];
}

// GetUOMCategoryResponse is the response for getting a UOM category.
message GetUOMCategoryResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // UOM category data.
  UOMCategory data = 2;
}

// =============================================================================
// MESSAGES - Update
// =============================================================================

// UpdateUOMCategoryRequest is the request for updating a UOM category.
// Note: category_code is immutable and cannot be changed after creation.
message UpdateUOMCategoryRequest {
  // UOM category ID to update (UUID format).
  string uom_category_id = 1 [(buf.validate.field).string.uuid = true];
  // New display name (optional, 1-100 chars if provided).
  optional string category_name = 2 [(buf.validate.field).string = {max_len: 100}];
  // New description (optional, max 500 chars).
  optional string description = 3 [(buf.validate.field).string.max_len = 500];
  // New active status (optional).
  optional bool is_active = 4;
}

// UpdateUOMCategoryResponse is the response for updating a UOM category.
message UpdateUOMCategoryResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Updated UOM category data.
  UOMCategory data = 2;
}

// =============================================================================
// MESSAGES - Delete
// =============================================================================

// DeleteUOMCategoryRequest is the request for deleting (soft delete) a UOM category.
message DeleteUOMCategoryRequest {
  // UOM category ID to delete (UUID format).
  string uom_category_id = 1 [(buf.validate.field).string.uuid = true];
}

// DeleteUOMCategoryResponse is the response for deleting a UOM category.
message DeleteUOMCategoryResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
}

// =============================================================================
// MESSAGES - List with Search & Filter
// =============================================================================

// ListUOMCategoriesRequest is the request for listing UOM categories
// with search, filter, and pagination.
message ListUOMCategoriesRequest {
  // Page number (1-indexed, default 1, min 1).
  int32 page = 1 [(buf.validate.field).int32.gte = 1];
  // Items per page (1-100, default 10).
  int32 page_size = 2 [(buf.validate.field).int32 = {
    gte: 1
    lte: 100
  }];
  // Search query (searches in code, name, description).
  string search = 3 [(buf.validate.field).string.max_len = 100];
  // Filter by active status.
  // ACTIVE_FILTER_UNSPECIFIED (0) = show all, ACTIVE_FILTER_ACTIVE (1) = only active,
  // ACTIVE_FILTER_INACTIVE (2) = only inactive.
  ActiveFilter active_filter = 4;
  // Sort field: "code", "name", "created_at" (default: "code").
  string sort_by = 5 [(buf.validate.field).string = {
    in: [
      "",
      "code",
      "name",
      "created_at"
    ]
  }];
  // Sort order: "asc", "desc" (default: "asc").
  string sort_order = 6 [(buf.validate.field).string = {
    in: [
      "",
      "asc",
      "desc"
    ]
  }];
}

// ListUOMCategoriesResponse is the response for listing UOM categories.
message ListUOMCategoriesResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // List of UOM categories.
  repeated UOMCategory data = 2;
  // Pagination metadata.
  common.v1.PaginationResponse pagination = 3;
}

// =============================================================================
// MESSAGES - Excel Export
// =============================================================================

// ExportUOMCategoriesRequest is the request for exporting UOM categories to Excel.
message ExportUOMCategoriesRequest {
  // Filter by active status.
  // ACTIVE_FILTER_UNSPECIFIED (0) = export all, ACTIVE_FILTER_ACTIVE (1) = only active,
  // ACTIVE_FILTER_INACTIVE (2) = only inactive.
  ActiveFilter active_filter = 1;
}

// ExportUOMCategoriesResponse is the response containing the Excel file.
message ExportUOMCategoriesResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Excel file content as bytes (.xlsx format).
  bytes file_content = 2;
  // Suggested filename.
  string file_name = 3;
}

// =============================================================================
// MESSAGES - Excel Import
// =============================================================================

// ImportUOMCategoriesRequest is the request for importing UOM categories from Excel.
message ImportUOMCategoriesRequest {
  // Excel file content as bytes (.xlsx or .xls format).
  bytes file_content = 1 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 10485760
  }];
  // Original filename (for format detection).
  // Must be a simple filename without path separators.
  string file_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
    pattern: "^[^/\\\\]+\\.(xlsx|xls)$"
  }];
  // Required. How to handle duplicates: "skip", "update", "error".
  string duplicate_action = 3 [(buf.validate.field).string = {
    in: [
      "skip",
      "update",
      "error"
    ]
    min_len: 1
  }];
}

// ImportUOMCategoriesResponse is the response for importing UOM categories.
message ImportUOMCategoriesResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Number of successfully imported records.
  int32 success_count = 2;
  // Number of skipped records (duplicates with skip action).
  int32 skipped_count = 3;
  // Number of updated records (duplicates with update action).
  int32 updated_count = 4;
  // Number of failed records.
  int32 failed_count = 5;
  // Details of failed records.
  repeated ImportError errors = 6;
}

// =============================================================================
// MESSAGES - Download Template
// =============================================================================

// DownloadUOMCategoryTemplateRequest is the request for downloading the import template.
message DownloadUOMCategoryTemplateRequest {}

// DownloadUOMCategoryTemplateResponse is the response containing the template file.
message DownloadUOMCategoryTemplateResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Excel template file content as bytes (.xlsx format).
  bytes file_content = 2;
  // Suggested filename.
  string file_name = 3;
}

// =============================================================================
// SERVICE DEFINITION
// =============================================================================

// UOMCategoryService provides CRUD operations for UOM Category master data.
service UOMCategoryService {
  // CreateUOMCategory creates a new UOM category.
  rpc CreateUOMCategory(CreateUOMCategoryRequest) returns (CreateUOMCategoryResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/uom-categories"
      body: "*"
    };
  }

  // GetUOMCategory retrieves a UOM category by ID.
  rpc GetUOMCategory(GetUOMCategoryRequest) returns (GetUOMCategoryResponse) {
    option (google.api.http) = {get: "/api/v1/finance/uom-categories/{uom_category_id}"};
  }

  // UpdateUOMCategory updates an existing UOM category.
  // Note: category_code is immutable and cannot be changed.
  rpc UpdateUOMCategory(UpdateUOMCategoryRequest) returns (UpdateUOMCategoryResponse) {
    option (google.api.http) = {
      put: "/api/v1/finance/uom-categories/{uom_category_id}"
      body: "*"
    };
  }

  // DeleteUOMCategory soft deletes a UOM category.
  rpc DeleteUOMCategory(DeleteUOMCategoryRequest) returns (DeleteUOMCategoryResponse) {
    option (google.api.http) = {delete: "/api/v1/finance/uom-categories/{uom_category_id}"};
  }

  // ListUOMCategories lists UOM categories with search, filter, and pagination.
  rpc ListUOMCategories(ListUOMCategoriesRequest) returns (ListUOMCategoriesResponse) {
    option (google.api.http) = {get: "/api/v1/finance/uom-categories"};
  }

  // ExportUOMCategories exports UOM categories to Excel file.
  rpc ExportUOMCategories(ExportUOMCategoriesRequest) returns (ExportUOMCategoriesResponse) {
    option (google.api.http) = {get: "/api/v1/finance/uom-categories/export"};
  }

  // ImportUOMCategories imports UOM categories from Excel file.
  rpc ImportUOMCategories(ImportUOMCategoriesRequest) returns (ImportUOMCategoriesResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/uom-categories/import"
      body: "*"
    };
  }

  // DownloadUOMCategoryTemplate downloads the Excel import template.
  rpc DownloadUOMCategoryTemplate(DownloadUOMCategoryTemplateRequest) returns (DownloadUOMCategoryTemplateResponse) {
    option (google.api.http) = {get: "/api/v1/finance/uom-categories/template"};
  }
}
