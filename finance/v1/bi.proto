  PERIODE_GRAIN_MONTHLY = 2;
  PERIODE_GRAIN_QUARTERLY = 3;
  PERIODE_GRAIN_YEARLY = 4;
}
enum CompareMode {
  COMPARE_MODE_UNSPECIFIED = 0;
  COMPARE_MODE_NONE = 1;
  COMPARE_MODE_MOM = 2;
  COMPARE_MODE_QOQ = 3;
  COMPARE_MODE_YOY = 4;
  COMPARE_MODE_YTD = 5;
  COMPARE_MODE_R12 = 6;
}
enum ChartType {
  CHART_TYPE_UNSPECIFIED = 0;
  CHART_TYPE_BAR = 1;
  CHART_TYPE_HORIZONTAL_BAR = 2;
