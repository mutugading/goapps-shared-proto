// =================== Services ===================

// DashboardService manages BI dashboard definitions, groups, and per-dashboard role mappings.
service DashboardService {
  // CreateDashboard creates a new dashboard definition.
  rpc CreateDashboard(CreateDashboardRequest) returns (CreateDashboardResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/bi/dashboards"
      body: "*"
    };
  }
  // GetDashboard returns a dashboard by ID.
  rpc GetDashboard(GetDashboardRequest) returns (GetDashboardResponse) {
    option (google.api.http) = {get: "/api/v1/finance/bi/dashboards/{dashboard_id}"};
  }
  // GetDashboardByCode returns a dashboard by its business code.
  rpc GetDashboardByCode(GetDashboardByCodeRequest) returns (GetDashboardByCodeResponse) {
    option (google.api.http) = {get: "/api/v1/finance/bi/dashboards/by-code/{dashboard_code}"};
  }
  // ListDashboards returns paginated dashboards for admin.
  rpc ListDashboards(ListDashboardsRequest) returns (ListDashboardsResponse) {
    option (google.api.http) = {get: "/api/v1/finance/bi/dashboards"};
  }
  // UpdateDashboard mutates an existing dashboard.
  rpc UpdateDashboard(UpdateDashboardRequest) returns (UpdateDashboardResponse) {
    option (google.api.http) = {
      put: "/api/v1/finance/bi/dashboards/{dashboard_id}"
      body: "*"
    };
  }
  // DeleteDashboard soft-deletes a dashboard.
  rpc DeleteDashboard(DeleteDashboardRequest) returns (DeleteDashboardResponse) {
    option (google.api.http) = {delete: "/api/v1/finance/bi/dashboards/{dashboard_id}"};
  }
  // DuplicateDashboard clones a dashboard with a new code/title.
  rpc DuplicateDashboard(DuplicateDashboardRequest) returns (DuplicateDashboardResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/bi/dashboards/{dashboard_id}/duplicate"
      body: "*"
    };
  }
  // SetDashboardRoles overwrites the dashboard's role whitelist.
  rpc SetDashboardRoles(SetDashboardRolesRequest) returns (SetDashboardRolesResponse) {
    option (google.api.http) = {
      put: "/api/v1/finance/bi/dashboards/{dashboard_id}/roles"
      body: "*"
    };
  }
  // ListAccessibleDashboards returns dashboards visible to the calling user (for viewer sidebar).
  rpc ListAccessibleDashboards(ListAccessibleDashboardsRequest) returns (ListAccessibleDashboardsResponse) {
    option (google.api.http) = {get: "/api/v1/finance/bi/dashboards/accessible"};
  }
  // ListFeaturedDashboards returns dashboards pinned to the Executive Dashboard landing page.
  rpc ListFeaturedDashboards(ListFeaturedDashboardsRequest) returns (ListFeaturedDashboardsResponse) {
    option (google.api.http) = {get: "/api/v1/finance/bi/dashboards/featured"};
  }
  // CreateDashboardGroup creates a new dashboard group.
  rpc CreateDashboardGroup(CreateDashboardGroupRequest) returns (CreateDashboardGroupResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/bi/groups"
      body: "*"
    };
  }
  // ListDashboardGroups returns dashboard groups.
  rpc ListDashboardGroups(ListDashboardGroupsRequest) returns (ListDashboardGroupsResponse) {
    option (google.api.http) = {get: "/api/v1/finance/bi/groups"};
  }
  // UpdateDashboardGroup mutates a group.
  rpc UpdateDashboardGroup(UpdateDashboardGroupRequest) returns (UpdateDashboardGroupResponse) {
    option (google.api.http) = {
      put: "/api/v1/finance/bi/groups/{group_id}"
      body: "*"
    };
  }
  // DeleteDashboardGroup soft-deletes a group.
  rpc DeleteDashboardGroup(DeleteDashboardGroupRequest) returns (DeleteDashboardGroupResponse) {
    option (google.api.http) = {delete: "/api/v1/finance/bi/groups/{group_id}"};
  }
  // ListConfigAudit returns the dashboard/group configuration change history.
  rpc ListConfigAudit(ListConfigAuditRequest) returns (ListConfigAuditResponse) {
    option (google.api.http) = {get: "/api/v1/finance/bi/audit"};
  }
}

// ChartDataService serves shaped chart data for the viewer and admin preview.
