// BiJobService manages ETL job registry and logs.
service BiJobService {
  // ListJobs returns ETL job registry entries.
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse) {
    option (google.api.http) = {get: "/api/v1/finance/bi/jobs"};
  }
  // ListJobLogs returns logs for a specific job.
  rpc ListJobLogs(ListJobLogsRequest) returns (ListJobLogsResponse) {
    option (google.api.http) = {get: "/api/v1/finance/bi/jobs/{job_id}/logs"};
  }
  // TriggerJob manually triggers an ETL job run.
  rpc TriggerJob(TriggerJobRequest) returns (TriggerJobResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/bi/jobs/{job_id}/trigger"
      body: "*"
    };
  }
  // CreateBiJob registers a new ETL job in the bi_job registry.
  rpc CreateBiJob(CreateBiJobRequest) returns (CreateBiJobResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/bi/jobs"
      body: "*"
    };
  }
  // UpdateBiJob mutates schedule_cron, oracle_procedure, config, or is_active.
  rpc UpdateBiJob(UpdateBiJobRequest) returns (UpdateBiJobResponse) {
    option (google.api.http) = {
      put: "/api/v1/finance/bi/jobs/{job_id}"
      body: "*"
    };
  }
  // DeleteBiJob soft-disables a job (sets is_active=false, preserves logs).
  rpc DeleteBiJob(DeleteBiJobRequest) returns (DeleteBiJobResponse) {
    option (google.api.http) = {delete: "/api/v1/finance/bi/jobs/{job_id}"};
  }
}

// BiUploadService handles Excel upload: template download, parse/preview into staging,
// commit (UPSERT to fact_metric), cancel, and upload session history.
service BiUploadService {
  // DownloadUploadTemplate returns a blank .xlsx template matching the FACT_METRIC shape.
  rpc DownloadUploadTemplate(DownloadUploadTemplateRequest) returns (DownloadUploadTemplateResponse) {
    option (google.api.http) = {get: "/api/v1/finance/bi/uploads/template"};
  }
  // ParseUpload parses an uploaded .xlsx, validates rows, writes to staging, returns a preview.
  rpc ParseUpload(ParseUploadRequest) returns (ParseUploadResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/bi/uploads/parse"
      body: "*"
    };
  }
  // CommitUpload UPSERTs the staged rows of a previewed session into fact_metric.
  rpc CommitUpload(CommitUploadRequest) returns (CommitUploadResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/bi/uploads/{upload_id}/commit"
      body: "*"
    };
  }
  // CancelUpload discards a previewed session without committing.
  rpc CancelUpload(CancelUploadRequest) returns (CancelUploadResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/bi/uploads/{upload_id}/cancel"
      body: "*"
    };
  }
  // ListUploads returns paginated upload session history.
  rpc ListUploads(ListUploadsRequest) returns (ListUploadsResponse) {
    option (google.api.http) = {get: "/api/v1/finance/bi/uploads"};
  }
}
