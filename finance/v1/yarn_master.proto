// =============================================================================
// ENUMS
// =============================================================================

// MCTypeFilter filters machines by machine type.
enum MCTypeFilter {
  MC_TYPE_FILTER_UNSPECIFIED = 0; // No filter — show all types.
  MC_TYPE_FILTER_DTY = 1; // Draw Texturing Yarn machines.
  MC_TYPE_FILTER_POY = 2; // Partially Oriented Yarn machines.
  MC_TYPE_FILTER_FDY = 3; // Fully Drawn Yarn machines.
  MC_TYPE_FILTER_PTY = 4; // Polypropylene Texturing Yarn machines.
  MC_TYPE_FILTER_SDY = 5; // Semi-Dull Yarn machines.
  MC_TYPE_FILTER_TTY = 6; // Twisted Textured Yarn machines.
}

// =============================================================================
// MESSAGES — Machine
// =============================================================================

// Machine represents a yarn machine master record.
message Machine {
  // UUID primary key.
  string machine_id = 1;
  // Unique machine code. Immutable after creation.
  string machine_code = 2;
  // Display name.
  string machine_name = 3;
  // Machine type (DTY, POY, FDY, etc.).
  string mc_type = 4;
  // Physical location (plant/building/floor).
  string mc_location = 5;
  // Number of spindle positions.
  int32 no_of_position = 6;
  // Number of ends per position.
  int32 no_of_end = 7;
  // Machine speed in m/min.
  double mc_speed = 8;
  // Optional machine RPM.
  optional double machine_rpm = 9;
  // Machine efficiency as a percentage (default 95).
  double mc_efficiency = 10;
  // Optional power cost per day in USD.
  optional double power_per_day = 11;
  // Whether the record is active.
  bool is_active = 12;
  // Optional notes.
  string notes = 13;
  // Audit metadata.
  common.v1.AuditInfo audit = 16;
}

// CreateMachineRequest is the request for creating a machine.
message CreateMachineRequest {
  // Unique machine code (max 30 chars).
  string machine_code = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 30
  }];
  // Display name (max 100 chars).
