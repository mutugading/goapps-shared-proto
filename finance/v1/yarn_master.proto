// =============================================================================
// MESSAGES — Yarn Lookup Fill (auto-populate CAPP from master selection)
// =============================================================================

// GetLookupFillValuesRequest requests auto-fill values from a master lookup selection.
message GetLookupFillValuesRequest {
  // lookup_master_code from mst_parameter.lookup_master_code.
  // Valid values: "MACHINE" | "INTERMINGLING" | "PRODUCT_GRADE" | "MB_HEAD" | "BOX_BOBBIN_COST"
  string lookup_master_code = 1 [(buf.validate.field).string.min_len = 1];
  // Key of the selected master record (e.g., mc_code, intm_code, pg_code, mbh_mb_costing, bbc_code).
  string selected_key = 2 [(buf.validate.field).string.min_len = 1];
  // Source param code that triggered the lookup — used to resolve CAP vs DEL variant for BOX_BOBBIN_COST.
  // Optional; required only for BOX_BOBBIN_COST.
  string source_param_code = 3;
}

// GetLookupFillValuesResponse returns numeric and text fills to auto-populate CAPP params.
message GetLookupFillValuesResponse {
  common.v1.BaseResponse base = 1;
  // param_code → numeric value to fill (e.g., {"MC_SPEED": 800.0, "MC_EFFICIENCY": 92.0}).
  map<string, double> numeric_fills = 2;
  // param_code → text value to fill (e.g., {"MB_DYE_NAME": "CIBA RED"}).
  map<string, string> text_fills = 3;
  // Human-readable label for UI toast (e.g., "Barmag DTY Line D — 504 pos, 800 m/min").
  string display_label = 4;
}

// =============================================================================
// SERVICES
// =============================================================================

// MachineService manages yarn machine master data.
service MachineService {
  // CreateMachine creates a new machine record.
  rpc CreateMachine(CreateMachineRequest) returns (CreateMachineResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/machines"
      body: "*"
    };
  }
  // GetMachine retrieves a machine by ID.
  rpc GetMachine(GetMachineRequest) returns (GetMachineResponse) {
    option (google.api.http) = {get: "/api/v1/finance/machines/{machine_id}"};
  }
  // ListMachines lists machine records with search, filter, and pagination.
  rpc ListMachines(ListMachinesRequest) returns (ListMachinesResponse) {
    option (google.api.http) = {get: "/api/v1/finance/machines"};
  }
  // UpdateMachine updates an existing machine record.
  rpc UpdateMachine(UpdateMachineRequest) returns (UpdateMachineResponse) {
    option (google.api.http) = {
      put: "/api/v1/finance/machines/{machine_id}"
      body: "*"
    };
  }
  // DeleteMachine soft-deletes a machine record.
  rpc DeleteMachine(DeleteMachineRequest) returns (DeleteMachineResponse) {
    option (google.api.http) = {delete: "/api/v1/finance/machines/{machine_id}"};
  }
  // ExportMachines exports machine records to Excel.
  rpc ExportMachines(ExportMachinesRequest) returns (ExportMachinesResponse) {
    option (google.api.http) = {get: "/api/v1/finance/machines/export"};
  }
  // ImportMachines imports machine records from Excel.
  rpc ImportMachines(ImportMachinesRequest) returns (ImportMachinesResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/machines/import"
      body: "*"
    };
  }
  // DownloadMachineTemplate downloads the Excel import template.
  rpc DownloadMachineTemplate(DownloadMachineTemplateRequest) returns (DownloadMachineTemplateResponse) {
    option (google.api.http) = {get: "/api/v1/finance/machines/template"};
  }
}

// BoxBobbinCostService manages packing configuration and period-specific rates.
service BoxBobbinCostService {
  // CreateBoxBobbinCost creates a new packing config.
  rpc CreateBoxBobbinCost(CreateBoxBobbinCostRequest) returns (CreateBoxBobbinCostResponse) {
    option (google.api.http) = {
      post: "/api/v1/finance/box-bobbin-costs"
      body: "*"
    };
  }
  // GetBoxBobbinCost retrieves a config by ID (includes rates).
  rpc GetBoxBobbinCost(GetBoxBobbinCostRequest) returns (GetBoxBobbinCostResponse) {
    option (google.api.http) = {get: "/api/v1/finance/box-bobbin-costs/{bbc_id}"};
  }
  // ListBoxBobbinCosts lists configs with search, filter, and pagination.
  rpc ListBoxBobbinCosts(ListBoxBobbinCostsRequest) returns (ListBoxBobbinCostsResponse) {
    option (google.api.http) = {get: "/api/v1/finance/box-bobbin-costs"};
  }
  // UpdateBoxBobbinCost updates an existing config.
  rpc UpdateBoxBobbinCost(UpdateBoxBobbinCostRequest) returns (UpdateBoxBobbinCostResponse) {
    option (google.api.http) = {
      put: "/api/v1/finance/box-bobbin-costs/{bbc_id}"
      body: "*"
    };
  }
  // DeleteBoxBobbinCost soft-deletes a config.
  rpc DeleteBoxBobbinCost(DeleteBoxBobbinCostRequest) returns (DeleteBoxBobbinCostResponse) {
    option (google.api.http) = {delete: "/api/v1/finance/box-bobbin-costs/{bbc_id}"};
