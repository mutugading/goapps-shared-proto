    min_len: 1
    max_len: 100
  }];
  // Machine type (max 30 chars).
  string mc_type = 3 [(buf.validate.field).string.max_len = 30];
  // Physical location (max 100 chars).
  string mc_location = 4 [(buf.validate.field).string.max_len = 100];
  // Number of spindle positions (≥ 0).
  int32 no_of_position = 5 [(buf.validate.field).int32.gte = 0];
  // Number of ends per position (≥ 1).
  int32 no_of_end = 6 [(buf.validate.field).int32.gte = 1];
  // Machine speed in m/min (≥ 0).
  double mc_speed = 7 [(buf.validate.field).double.gte = 0];
  // Optional machine RPM.
  optional double machine_rpm = 8;
  // Machine efficiency percentage (0-100).
  double mc_efficiency = 9 [(buf.validate.field).double = {
    gte: 0
    lte: 100
  }];
  // Optional power cost per day in USD.
  optional double power_per_day = 10;
  // Optional notes (max 1000 chars).
  string notes = 11 [(buf.validate.field).string.max_len = 1000];
}

// CreateMachineResponse is the response for creating a machine.
