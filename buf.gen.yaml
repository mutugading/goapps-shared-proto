version: v2
# NOTE: Do not use clean: true as it deletes go.mod and go.sum
# This config is for Go backend generation only
# For TypeScript, use buf.gen.ts.yaml
managed:
  enabled: true
  disable:
    - file_option: go_package
      module: buf.build/bufbuild/protovalidate
    - file_option: go_package
      module: buf.build/googleapis/googleapis
  override:
    - file_option: go_package_prefix
      value: github.com/mutugading/goapps-backend/gen
      path: .
plugins:
  # ===========================================================================
  # Go Backend Generation (LOCAL binaries installed via `go install`).
  # buf.build remote plugins were unreachable during S7; local binaries remove
  # the runtime dependency on the BSR. To revert, swap each
  # `local: protoc-gen-XXX` back to `remote: buf.build/<owner>/<plugin>`.
  # ===========================================================================

  # Go protobuf structs
  - local: protoc-gen-go
    out: ../goapps-backend/gen
    opt:
      - paths=source_relative

  # gRPC service stubs
  - local: protoc-gen-go-grpc
    out: ../goapps-backend/gen
    opt:
      - paths=source_relative

  # gRPC-Gateway for REST API
  - local: protoc-gen-grpc-gateway
    out: ../goapps-backend/gen
    opt:
      - paths=source_relative

  # OpenAPI/Swagger documentation
  - local: protoc-gen-openapiv2
    out: ../goapps-backend/gen/openapi

inputs:
  - directory: .
    paths:
      - common
      - finance
      - iam
