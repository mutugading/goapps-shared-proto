syntax = "proto3";

package iam.v1;

// Note: go_package is managed by buf.gen.yaml managed mode

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "google/api/annotations.proto";
import "iam/v1/user.proto";

// =============================================================================
// MESSAGES - Entity
// =============================================================================

// EmployeeGroup represents an employee group / department category master record.
// Simpler than EmployeeLevel — groups users by function (e.g., ASM, DYM, DRV, MGR).
message EmployeeGroup {
  // Unique identifier (UUID).
  string employee_group_id = 1;
  // Unique code (e.g., "ASM", "DYM", "MGR"). Immutable after creation.
  string code = 2;
  // Display name (e.g., "Assembly", "Dynamometer", "Manager").
  string name = 3;
  // Whether the group is active.
  bool is_active = 4;
  // Audit information.
  common.v1.AuditInfo audit = 16;
}

// =============================================================================
// MESSAGES - Create
// =============================================================================

// CreateEmployeeGroupRequest is the request for creating a new employee group.
message CreateEmployeeGroupRequest {
  // Unique code (uppercase alphanumeric, 1-20 chars). Must start with uppercase letter.
  // Immutable after creation.
  string code = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 20
    pattern: "^[A-Z][A-Z0-9]*$"
  }];
  // Display name (1-100 chars).
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];
}

// CreateEmployeeGroupResponse is the response for creating an employee group.
message CreateEmployeeGroupResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Created employee group data.
  EmployeeGroup data = 2;
}

// =============================================================================
// MESSAGES - Get
// =============================================================================

// GetEmployeeGroupRequest is the request for getting an employee group by ID.
message GetEmployeeGroupRequest {
  // Employee group ID (UUID format).
  string employee_group_id = 1 [(buf.validate.field).string.uuid = true];
}

// GetEmployeeGroupResponse is the response for getting an employee group.
message GetEmployeeGroupResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Employee group data.
  EmployeeGroup data = 2;
}

// =============================================================================
// MESSAGES - Update
// =============================================================================

// UpdateEmployeeGroupRequest is the request for updating an employee group.
// Note: code is immutable and cannot be changed after creation.
message UpdateEmployeeGroupRequest {
  // Employee group ID to update (UUID format).
  string employee_group_id = 1 [(buf.validate.field).string.uuid = true];
  // New display name (optional, 1-100 chars if provided).
  optional string name = 2 [(buf.validate.field).string = {max_len: 100}];
  // New active status (optional).
  optional bool is_active = 3;
}

// UpdateEmployeeGroupResponse is the response for updating an employee group.
message UpdateEmployeeGroupResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Updated employee group data.
  EmployeeGroup data = 2;
}

// =============================================================================
// MESSAGES - Delete
// =============================================================================

// DeleteEmployeeGroupRequest is the request for soft-deleting an employee group.
message DeleteEmployeeGroupRequest {
  // Employee group ID to delete (UUID format).
  string employee_group_id = 1 [(buf.validate.field).string.uuid = true];
}

// DeleteEmployeeGroupResponse is the response for deleting an employee group.
message DeleteEmployeeGroupResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
}

// =============================================================================
// MESSAGES - List with Search & Filter
// =============================================================================

// ListEmployeeGroupsRequest is the request for listing employee groups
// with search, filter, and pagination.
message ListEmployeeGroupsRequest {
  // Page number (1-indexed, default 1, min 1).
  int32 page = 1 [(buf.validate.field).int32.gte = 1];
  // Items per page (1-100, default 10).
  int32 page_size = 2 [(buf.validate.field).int32 = {
    gte: 1
    lte: 100
  }];
  // Search query (searches in code, name).
  string search = 3 [(buf.validate.field).string.max_len = 100];
  // Filter by active status. UNSPECIFIED (0) = show all.
  ActiveFilter active_filter = 4;
  // Sort field: "code", "name", "created_at" (default: "code").
  string sort_by = 5 [(buf.validate.field).string = {
    in: [
      "",
      "code",
      "name",
      "created_at"
    ]
  }];
  // Sort order: "asc", "desc" (default: "asc").
  string sort_order = 6 [(buf.validate.field).string = {
    in: [
      "",
      "asc",
      "desc"
    ]
  }];
}

// ListEmployeeGroupsResponse is the response for listing employee groups.
message ListEmployeeGroupsResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // List of employee groups.
  repeated EmployeeGroup data = 2;
  // Pagination metadata.
  common.v1.PaginationResponse pagination = 3;
}

// =============================================================================
// MESSAGES - Excel Export
// =============================================================================

// ExportEmployeeGroupsRequest is the request for exporting employee groups to Excel.
message ExportEmployeeGroupsRequest {
  // Filter by active status. UNSPECIFIED (0) = export all.
  ActiveFilter active_filter = 1;
}

// ExportEmployeeGroupsResponse is the response containing the Excel file.
message ExportEmployeeGroupsResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Excel file content as bytes (.xlsx format).
  bytes file_content = 2;
  // Suggested filename.
  string file_name = 3;
}

// =============================================================================
// MESSAGES - Excel Import
// =============================================================================

// ImportEmployeeGroupsRequest is the request for importing employee groups from Excel.
message ImportEmployeeGroupsRequest {
  // Excel file content as bytes (.xlsx or .xls format, max 10MB).
  bytes file_content = 1 [(buf.validate.field).bytes = {
    min_len: 1
    max_len: 10485760
  }];
  // Original filename (for format detection). Must be a simple filename without path separators.
  string file_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
    pattern: "^[^/\\\\]+\\.(xlsx|xls)$"
  }];
  // Required. How to handle duplicates: "skip", "update", "error".
  string duplicate_action = 3 [(buf.validate.field).string = {
    in: [
      "skip",
      "update",
      "error"
    ]
    min_len: 1
  }];
}

// ImportEmployeeGroupsResponse is the response for importing employee groups.
message ImportEmployeeGroupsResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Number of successfully imported records.
  int32 success_count = 2;
  // Number of skipped records (duplicates with skip action).
  int32 skipped_count = 3;
  // Number of updated records (duplicates with update action).
  int32 updated_count = 4;
  // Number of failed records.
  int32 failed_count = 5;
  // Details of failed records.
  repeated ImportError errors = 6;
}

// =============================================================================
// MESSAGES - Download Template
// =============================================================================

// DownloadEmployeeGroupTemplateRequest is the request for downloading the import template.
message DownloadEmployeeGroupTemplateRequest {}

// DownloadEmployeeGroupTemplateResponse is the response containing the template file.
message DownloadEmployeeGroupTemplateResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Excel template file content as bytes (.xlsx format).
  bytes file_content = 2;
  // Suggested filename.
  string file_name = 3;
}

// =============================================================================
// SERVICE DEFINITION
// =============================================================================

// EmployeeGroupService provides CRUD operations for Employee Group master data.
service EmployeeGroupService {
  // CreateEmployeeGroup creates a new employee group.
  rpc CreateEmployeeGroup(CreateEmployeeGroupRequest) returns (CreateEmployeeGroupResponse) {
    option (google.api.http) = {
      post: "/api/v1/iam/employee-groups"
      body: "*"
    };
  }

  // GetEmployeeGroup retrieves an employee group by ID.
  rpc GetEmployeeGroup(GetEmployeeGroupRequest) returns (GetEmployeeGroupResponse) {
    option (google.api.http) = {get: "/api/v1/iam/employee-groups/{employee_group_id}"};
  }

  // UpdateEmployeeGroup updates an existing employee group.
  // Note: code is immutable and cannot be changed.
  rpc UpdateEmployeeGroup(UpdateEmployeeGroupRequest) returns (UpdateEmployeeGroupResponse) {
    option (google.api.http) = {
      put: "/api/v1/iam/employee-groups/{employee_group_id}"
      body: "*"
    };
  }

  // DeleteEmployeeGroup soft deletes an employee group.
  rpc DeleteEmployeeGroup(DeleteEmployeeGroupRequest) returns (DeleteEmployeeGroupResponse) {
    option (google.api.http) = {delete: "/api/v1/iam/employee-groups/{employee_group_id}"};
  }

  // ListEmployeeGroups lists employee groups with search, filter, and pagination.
  rpc ListEmployeeGroups(ListEmployeeGroupsRequest) returns (ListEmployeeGroupsResponse) {
    option (google.api.http) = {get: "/api/v1/iam/employee-groups"};
  }

  // ExportEmployeeGroups exports employee groups to Excel file.
  rpc ExportEmployeeGroups(ExportEmployeeGroupsRequest) returns (ExportEmployeeGroupsResponse) {
    option (google.api.http) = {get: "/api/v1/iam/employee-groups/export"};
  }

  // ImportEmployeeGroups imports employee groups from Excel file.
  rpc ImportEmployeeGroups(ImportEmployeeGroupsRequest) returns (ImportEmployeeGroupsResponse) {
    option (google.api.http) = {
      post: "/api/v1/iam/employee-groups/import"
      body: "*"
    };
  }

  // DownloadEmployeeGroupTemplate downloads the Excel import template.
  rpc DownloadEmployeeGroupTemplate(DownloadEmployeeGroupTemplateRequest) returns (DownloadEmployeeGroupTemplateResponse) {
    option (google.api.http) = {get: "/api/v1/iam/employee-groups/template"};
  }
}
