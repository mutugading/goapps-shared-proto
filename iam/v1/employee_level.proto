}

// ReleaseEmployeeLevelRequest transitions workflow APPROVED → RELEASED.
message ReleaseEmployeeLevelRequest {
  // Employee level ID (UUID format).
  string employee_level_id = 1 [(buf.validate.field).string.uuid = true];
  // Optional notes for the transition (audit trail).
