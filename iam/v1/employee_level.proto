// =============================================================================
// ENUMS
// =============================================================================

// EmployeeLevelType represents the functional category of an employee level.
enum EmployeeLevelType {
  // Default / unset.
  EMPLOYEE_LEVEL_TYPE_UNSPECIFIED = 0;
  // Executive level (e.g., Director, GM, Assistant GM).
  EMPLOYEE_LEVEL_TYPE_EXECUTIVE = 1;
  // Non-executive level (e.g., Supervisor, Senior Staff).
  EMPLOYEE_LEVEL_TYPE_NON_EXECUTIVE = 2;
  // Operator level (e.g., skilled operator, technician).
  EMPLOYEE_LEVEL_TYPE_OPERATOR = 3;
  // Other / uncategorized.
  EMPLOYEE_LEVEL_TYPE_OTHER = 4;
}

// EmployeeLevelWorkflow represents the lifecycle state of an employee level.
// State machine: DRAFT → SUBMITTED → APPROVED → RELEASED.
// Bypass: users with bypass permission can jump from any pre-release state to RELEASED.
enum EmployeeLevelWorkflow {
  // Default / unset.
  EMPLOYEE_LEVEL_WORKFLOW_UNSPECIFIED = 0;
  // Draft — not yet published.
  EMPLOYEE_LEVEL_WORKFLOW_DRAFT = 1;
  // Released — active and in use.
  EMPLOYEE_LEVEL_WORKFLOW_RELEASED = 2;
  // Super user — reserved for top-level system access.
  EMPLOYEE_LEVEL_WORKFLOW_SUPER_USER = 3;
  // Submitted — pending approval.
  EMPLOYEE_LEVEL_WORKFLOW_SUBMITTED = 4;
  // Approved — approved, pending release.
  EMPLOYEE_LEVEL_WORKFLOW_APPROVED = 5;
}

// =============================================================================
// MESSAGES - Entity
// =============================================================================

// EmployeeLevel represents an employee level / job grade master record.
// Used to categorize users by their organizational grade (e.g., SU, P-9, SS-22).
message EmployeeLevel {
  // Unique identifier (UUID).
  string employee_level_id = 1;
  // Unique code (e.g., "SU", "P-9", "SS-22"). Immutable after creation.
  string code = 2;
  // Display name (e.g., "Super User", "Assistant GM").
  string name = 3;
  // Numeric grade (0-99). Higher number = higher grade in some hierarchies;
  // semantic is defined by the organization.
  int32 grade = 4;
  // Functional type (executive, non-executive, operator, other).
  EmployeeLevelType type = 5;
  // Sort sequence (0-999). Used to order entries in UI.
  int32 sequence = 6;
  // Workflow state (draft, released, super user).
  EmployeeLevelWorkflow workflow = 7;
  // Whether the level is active.
  bool is_active = 8;
  // Audit information.
  common.v1.AuditInfo audit = 16;
}

// =============================================================================
// MESSAGES - Create
// =============================================================================

