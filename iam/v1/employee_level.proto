// =============================================================================
// SERVICE DEFINITION
// =============================================================================

// EmployeeLevelService provides CRUD operations for Employee Level master data.
service EmployeeLevelService {
  // CreateEmployeeLevel creates a new employee level.
  rpc CreateEmployeeLevel(CreateEmployeeLevelRequest) returns (CreateEmployeeLevelResponse) {
    option (google.api.http) = {
      post: "/api/v1/iam/employee-levels"
      body: "*"
    };
  }

  // GetEmployeeLevel retrieves an employee level by ID.
  rpc GetEmployeeLevel(GetEmployeeLevelRequest) returns (GetEmployeeLevelResponse) {
    option (google.api.http) = {get: "/api/v1/iam/employee-levels/{employee_level_id}"};
  }

  // UpdateEmployeeLevel updates an existing employee level.
  // Note: code is immutable and cannot be changed.
  rpc UpdateEmployeeLevel(UpdateEmployeeLevelRequest) returns (UpdateEmployeeLevelResponse) {
    option (google.api.http) = {
      put: "/api/v1/iam/employee-levels/{employee_level_id}"
      body: "*"
    };
  }

  // DeleteEmployeeLevel soft deletes an employee level.
  rpc DeleteEmployeeLevel(DeleteEmployeeLevelRequest) returns (DeleteEmployeeLevelResponse) {
    option (google.api.http) = {delete: "/api/v1/iam/employee-levels/{employee_level_id}"};
  }

  // ListEmployeeLevels lists employee levels with search, filter, and pagination.
  rpc ListEmployeeLevels(ListEmployeeLevelsRequest) returns (ListEmployeeLevelsResponse) {
    option (google.api.http) = {get: "/api/v1/iam/employee-levels"};
  }

  // ExportEmployeeLevels exports employee levels to Excel file.
  rpc ExportEmployeeLevels(ExportEmployeeLevelsRequest) returns (ExportEmployeeLevelsResponse) {
    option (google.api.http) = {get: "/api/v1/iam/employee-levels/export"};
  }

  // ImportEmployeeLevels imports employee levels from Excel file.
  rpc ImportEmployeeLevels(ImportEmployeeLevelsRequest) returns (ImportEmployeeLevelsResponse) {
    option (google.api.http) = {
      post: "/api/v1/iam/employee-levels/import"
      body: "*"
    };
  }

  // DownloadEmployeeLevelTemplate downloads the Excel import template.
  rpc DownloadEmployeeLevelTemplate(DownloadEmployeeLevelTemplateRequest) returns (DownloadEmployeeLevelTemplateResponse) {
    option (google.api.http) = {get: "/api/v1/iam/employee-levels/template"};
  }

  // SubmitEmployeeLevel transitions workflow from DRAFT → SUBMITTED.
  rpc SubmitEmployeeLevel(SubmitEmployeeLevelRequest) returns (SubmitEmployeeLevelResponse) {
    option (google.api.http) = {
      post: "/api/v1/iam/employee-levels/{employee_level_id}/submit"
      body: "*"
    };
  }

  // ApproveEmployeeLevel transitions workflow from SUBMITTED → APPROVED.
  rpc ApproveEmployeeLevel(ApproveEmployeeLevelRequest) returns (ApproveEmployeeLevelResponse) {
    option (google.api.http) = {
      post: "/api/v1/iam/employee-levels/{employee_level_id}/approve"
      body: "*"
    };
  }

  // ReleaseEmployeeLevel transitions workflow from APPROVED → RELEASED.
  rpc ReleaseEmployeeLevel(ReleaseEmployeeLevelRequest) returns (ReleaseEmployeeLevelResponse) {
    option (google.api.http) = {
      post: "/api/v1/iam/employee-levels/{employee_level_id}/release"
      body: "*"
    };
  }

  // BypassReleaseEmployeeLevel transitions workflow directly to RELEASED from any state.
  rpc BypassReleaseEmployeeLevel(BypassReleaseEmployeeLevelRequest) returns (BypassReleaseEmployeeLevelResponse) {
    option (google.api.http) = {
      post: "/api/v1/iam/employee-levels/{employee_level_id}/bypass-release"
      body: "*"
    };
  }
}

// =============================================================================
// MESSAGES - Workflow Transitions
// =============================================================================

// SubmitEmployeeLevelRequest transitions workflow DRAFT → SUBMITTED.
message SubmitEmployeeLevelRequest {
  // Employee level ID (UUID format).
  string employee_level_id = 1 [(buf.validate.field).string.uuid = true];
  // Optional notes for the transition (audit trail).
  string notes = 2 [(buf.validate.field).string.max_len = 500];
}

