  string code = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 20
    pattern: "^[A-Z][A-Z0-9-]*$"
  }];
  // Display name (1-100 chars).
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];
  // Numeric grade (0-99).
  int32 grade = 3 [(buf.validate.field).int32 = {
    gte: 0
    lte: 99
  }];
  // Functional type. Must not be UNSPECIFIED.
  EmployeeLevelType type = 4 [(buf.validate.field).enum = {
    not_in: [0]
  }];
  // Sort sequence (0-999).
  int32 sequence = 5 [(buf.validate.field).int32 = {
    gte: 0
    lte: 999
  }];
  // Workflow state. Must not be UNSPECIFIED.
  EmployeeLevelWorkflow workflow = 6 [(buf.validate.field).enum = {
    not_in: [0]
  }];
}

// CreateEmployeeLevelResponse is the response for creating an employee level.
message CreateEmployeeLevelResponse {
  // Standard response metadata.
  common.v1.BaseResponse base = 1;
  // Created employee level data.
  EmployeeLevel data = 2;
}

